version: '3'
services:
  postgres:
    image: postgres:15.3-alpine
    container_name : postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - airflow_network
# Creates a new network if it does not exist   
networks:
  airflow_network:
    external: false

volumes:
  postgres_data: